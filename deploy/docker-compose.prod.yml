services:
  db:
    image: pgvector/pgvector:pg16
    env_file: ./.env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dalil -d dalil"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    env_file: ./.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model-cache:/home/app/.cache/huggingface
    networks:
      - internal
      - web
    mem_limit: 3g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file: ./.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model-cache:/home/app/.cache/huggingface
    networks:
      - internal
    mem_limit: 3g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - web
    restart: unless-stopped
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/run

  certbot:
    image: certbot/certbot:v3.0.0
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - web
    profiles:
      - certbot
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    command: alembic upgrade head
    env_file: ./.env.prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"
    profiles:
      - migrate

networks:
  internal:
    internal: true
  web: {}

volumes:
  pgdata: {}
  model-cache: {}
  certbot-conf: {}
  certbot-www: {}